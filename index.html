const Badge=({val,good})=><span style={{fontSize:11,fontWeight:600,color:good?"#30D158":"#FF453A",background:good?"#30D15818":"#FF453A18",padding:"2px 8px",borderRadius:6,display:"inline-flex",alignItems:"center",gap:3}}>{good?"↗":"↘"} {val}</span>;

const DarkCard=({children,span,style:s,...p})=><div style={{background:"#1c1c1e",borderRadius:20,padding:24,color:"#fff",gridColumn:span?`span ${span}`:undefined,...s}} {...p}>{children}</div>;
const BlueCard=({children,span,style:s,...p})=><div style={{background:"#5B5FC7",borderRadius:20,padding:24,color:"#fff",gridColumn:span?`span ${span}`:undefined,...s}} {...p}>{children}</div>;
const CardLabel=({children,icon})=><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>{icon&&<span style={{background:"#5B5FC720",borderRadius:6,padding:"3px 6px",fontSize:12}}>📊</span>}<span style={{fontSize:13,fontWeight:600,color:"#ffffffaa",letterSpacing:.3}}>{children}</span></div>;
const BigNum=({children,unit})=><div style={{display:"flex",alignItems:"baseline",gap:6}}>"<span className="bignum" style={{fontWeight:700,letterSpacing:-1,fontFamily:"'SF Pro Display',system-ui,sans-serif"}}>{children}</span>{unit&&<span style={{fontSize:14,color:"#ffffff80"}}>{unit}</span>}</div>;

function App(){
  const[sec,setSec]=React.useState("overview");
  const[cat,setCat]=React.useState("all");
  const[op,setOp]=React.useState(null);
  const ft=cat==="all"?tools:tools.filter(t=>t.cat===cat);

  const ttStyle={background:"#1c1c1e",border:"none",borderRadius:12,color:"#fff",fontSize:12,boxShadow:"0 8px 32px rgba(0,0,0,.3)"};

  return(
    <div style={{fontFamily:"'SF Pro Display',-apple-system,'Helvetica Neue',sans-serif",background:"#f2f2f7",minHeight:"100vh",color:"#1c1c1e"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        *{box-sizing:border-box;margin:0}
        .nv{padding:12px 20px;border:none;cursor:pointer;font:600 12px/1 'Inter',sans-serif;letter-spacing:.3px;transition:all .25s;background:transparent;color:#8e8e93;border-radius:10px;white-space:nowrap}
        .nv:hover{color:#1c1c1e;background:#e5e5ea}
        .nv.a{color:#fff;background:#1c1c1e}
        .fb{padding:7px 16px;border:1.5px solid #d1d1d6;background:#fff;cursor:pointer;font:500 12px 'Inter',sans-serif;transition:all .2s;color:#8e8e93;border-radius:20px;white-space:nowrap}
        .fb:hover{border-color:#8e8e93;color:#1c1c1e}
        .fb.a{background:#1c1c1e;color:#fff;border-color:#1c1c1e}
        .tcard{background:#fff;border-radius:16px;transition:all .25s;cursor:pointer;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
        .tcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-1px)}
        .topen{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1)}
        .dblk{background:#f2f2f7;border-radius:12px;padding:16px;margin-bottom:10px}
        .stp{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
        .recharts-tooltip-wrapper{filter:none!important}
        .tool-oneliner{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .g21{display:grid;grid-template-columns:2fr 1fr;gap:12px}
        .g211{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px}
        .hdr{padding:28px 40px 16px}
        .cnt{padding:24px 40px 60px}
        .navscroll{display:flex;gap:6px;background:#f2f2f7;border-radius:12px;padding:4px;width:fit-content}
        .tool-head{padding:18px 24px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
        .tool-meta{display:flex;gap:24px;align-items:center;flex-shrink:0;margin-left:20px}
        .tool-meta-item{text-align:right}
        .tool-body{padding:0 24px 24px}
        .road-items{border-top:1px solid #3a3a3c;padding:16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:6px 24px}
        .road-head{padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
        .bignum{font-size:36px}
        .h1t{font-size:32px}
        .final-t{font-size:24px}
        @media(max-width:900px){
          .g4{grid-template-columns:repeat(2,1fr)}
          .g211{grid-template-columns:1fr}
          .g21{grid-template-columns:1fr}
          .road-items{grid-template-columns:1fr}
          .road-head{flex-direction:column;align-items:flex-start;gap:12px}
        }
        @media(max-width:640px){
          .tool-oneliner{font-size:12px!important;white-space:normal!important;overflow:visible!important}
          .hdr{padding:20px 16px 12px}
          .cnt{padding:16px 16px 40px}
          .g4{grid-template-columns:1fr 1fr}
          .g2{grid-template-columns:1fr}
          .g211{grid-template-columns:1fr}
          .g21{grid-template-columns:1fr}
          .navscroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
          .navscroll::-webkit-scrollbar{display:none}
          .nv{padding:10px 14px;font-size:11px}
          .tool-head{padding:14px 16px;flex-direction:column;align-items:flex-start;gap:12px}
          .tool-meta{margin-left:0;gap:16px;width:100%;justify-content:flex-start}
          .tool-body{padding:0 16px 16px}
          .dblk{padding:12px}
          .bignum{font-size:28px}
          .h1t{font-size:24px}
          .final-t{font-size:18px}
          .road-items{padding:12px 16px;grid-template-columns:1fr}
          .road-head{padding:16px;flex-direction:column;align-items:flex-start;gap:10px}
        }
      `}</style>

      {/* HEADER */}
      <div style={{background:"#fff",boxShadow:"0 1px 0 #e5e5ea"}} className="hdr">
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <p style={{fontSize:13,fontWeight:600,color:"#5B5FC7",marginBottom:6,letterSpacing:.5}}>Исследование v3.0</p>
          <h1 className="h1t" style={{fontWeight:800,letterSpacing:-.8,marginBottom:4}}>Автоматизация ресторанов</h1>
          <p style={{fontSize:15,color:"#8e8e93",marginBottom:20}}>15 AI-инструментов для российского общепита с реалистичными сроками</p>
          <div className="navscroll">
            {S.map(s=><button key={s} className={`nv ${sec===s?"a":""}`} onClick={()=>setSec(s)}>{SL[s]}</button>)}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1200,margin:"0 auto"}} className="cnt">

        {/* ═══ OVERVIEW ═══ */}
        {sec==="overview"&&<div>
          {/* KPI Bento */}
          <div className="g4" style={{marginBottom:12}}>
            <DarkCard>
              <CardLabel>Оборот общепита 2025</CardLabel>
              <BigNum unit="трлн ₽">4.29</BigNum>
              <div style={{marginTop:8}}><Badge val="+21% к 2024" good/></div>
            </DarkCard>
            <DarkCard>
              <CardLabel>Средний чек</CardLabel>
              <BigNum unit="₽">1 896</BigNum>
              <div style={{marginTop:8}}><Badge val="+11.4%" good/></div>
            </DarkCard>
            <DarkCard>
              <CardLabel>Точки общепита</CardLabel>
              <BigNum unit="тыс.">115</BigNum>
              <div style={{marginTop:8}}><Badge val="−3.1% за год"/></div>
            </DarkCard>
            <DarkCard>
              <CardLabel>Зарплата HoReCa</CardLabel>
              <BigNum unit="тыс. ₽">83.4</BigNum>
              <div style={{marginTop:8}}><Badge val="+47%" good/></div>
            </DarkCard>
          </div>

          <div className="g211" style={{marginBottom:12}}>
            <DarkCard span={1}>
              <CardLabel>Оборот общепита РФ, трлн ₽</CardLabel>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={mkt}><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#5B5FC7" stopOpacity={.4}/><stop offset="100%" stopColor="#5B5FC7" stopOpacity={0}/></linearGradient></defs><XAxis dataKey="y" tick={{fontSize:11,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><YAxis tick={{fontSize:11,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><Tooltip contentStyle={ttStyle}/><Area type="monotone" dataKey="v" stroke="#5B5FC7" strokeWidth={2.5} fill="url(#ag)" dot={{r:3,fill:"#5B5FC7",stroke:"#1c1c1e",strokeWidth:2}}/></AreaChart>
              </ResponsiveContainer>
            </DarkCard>
            <DarkCard>
              <CardLabel>Текучка</CardLabel>
              <BigNum>80-100<span style={{fontSize:20}}>%</span></BigNum>
              <p style={{fontSize:12,color:"#ffffff60",marginTop:8}}>в год. Коллектив меняется полностью</p>
            </DarkCard>
            <DarkCard>
              <CardLabel>Безработица РФ</CardLabel>
              <BigNum>2.9<span style={{fontSize:20}}>%</span></BigNum>
              <p style={{fontSize:12,color:"#ffffff60",marginTop:8}}>исторический минимум</p>
            </DarkCard>
          </div>

          <div className="g2">
            <DarkCard>
              <CardLabel>Зарплаты HoReCa Москва, тыс. ₽/мес</CardLabel>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={sal} barGap={3}><XAxis dataKey="r" tick={{fontSize:10,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><YAxis tick={{fontSize:10,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><Tooltip contentStyle={ttStyle}/><Bar dataKey="p" fill="#3a3a3c" radius={[4,4,0,0]} name="2024"/><Bar dataKey="s" fill="#5B5FC7" radius={[4,4,0,0]} name="2025"/></BarChart>
              </ResponsiveContainer>
            </DarkCard>
            <DarkCard>
              <CardLabel>Лимит УСН без НДС, млн ₽</CardLabel>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={tax}><XAxis dataKey="y" tick={{fontSize:11,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><YAxis tick={{fontSize:11,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><Tooltip contentStyle={ttStyle}/><Bar dataKey="l" radius={[6,6,0,0]}>{tax.map((e,i)=><Cell key={i} fill={i===0?"#5B5FC7":"#FF453A"}/>)}</Bar></BarChart>
              </ResponsiveContainer>
              <p style={{fontSize:11,color:"#ffffff50",marginTop:4}}>С 60 млн → 10 млн к 2028</p>
            </DarkCard>
          </div>
        </div>}

        {/* ═══ PAIN POINTS ═══ */}
        {sec==="painpoints"&&<div>
          <div className="g2" style={{marginBottom:12}}>
            <DarkCard>
              <CardLabel>Индекс остроты проблем</CardLabel>
              <ResponsiveContainer width="100%" height={280}><RadarChart data={radar}><PolarGrid stroke="#3a3a3c"/><PolarAngleAxis dataKey="s" tick={{fontSize:12,fill:"#ffffffaa"}}/><PolarRadiusAxis tick={{fontSize:10,fill:"#ffffff40"}}/><Radar dataKey="A" stroke="#5B5FC7" fill="#5B5FC7" fillOpacity={.2} strokeWidth={2}/></RadarChart></ResponsiveContainer>
            </DarkCard>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[{s:"ЕГАИС",d:"Порционный учёт каждого бокала",c:"#BF5AF2"},{s:"Меркурий",d:"ВСД на мясо, молоко, рыбу",c:"#30D158"},{s:"Честный знак",d:"Маркировка молочки, воды, пива",c:"#5B5FC7"}].map((s,i)=>
                <DarkCard key={i} style={{flex:1,display:"flex",alignItems:"center",gap:16}}>
                  <div style={{width:4,height:40,borderRadius:2,background:s.c,flexShrink:0}}/>
                  <div><div style={{fontWeight:700,fontSize:15}}>{s.s}</div><div style={{fontSize:12,color:"#ffffffaa",marginTop:2}}>{s.d}</div></div>
                </DarkCard>
              )}
              <BlueCard style={{padding:16,textAlign:"center"}}>
                <span style={{fontSize:13,fontWeight:600}}>⚠️ Пиво → ЕГАИС + ЧЗ одновременно</span>
              </BlueCard>
            </div>
          </div>
          <div className="g2" style={{gap:10}}>
            {[{n:1,t:"Кадровый голод",s:"2 резюме/вакансию",a:"HR, SOP",l:95},{n:2,t:"Рост издержек",s:"Еда+труд=70%",a:"Food cost",l:88},{n:3,t:"Налоговая реформа",s:"НДС 22%, лимит↓",a:"Налог. ассистент",l:82},{n:4,t:"Пищевые отходы",s:"4-10% закупок",a:"Прогноз",l:80},{n:5,t:"Маркетинг",s:"Привлечь в 5-25x дороже",a:"AI-контент",l:75},{n:6,t:"Отзывы",s:"Яндекс.Карты=воронка",a:"Автоответчик",l:78},{n:7,t:"Комплаенс",s:"3 госсистемы",a:"Мониторинг",l:78},{n:8,t:"Монополия доставки",s:"28-35% комиссия",a:"Свои каналы",l:70}].map((p,i)=>
              <DarkCard key={i} style={{padding:16,display:"flex",gap:14}}>
                <div style={{fontFamily:"'Inter'",fontSize:22,fontWeight:800,color:"#5B5FC7",minWidth:32}}>{String(p.n).padStart(2,"0")}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14}}>{p.t}</div>
                  <div style={{fontSize:11,color:"#ffffff80",marginTop:2}}>{p.s}</div>
                  <div style={{fontSize:11,color:"#30D158",marginTop:6}}>🤖 {p.a}</div>
                  <div style={{marginTop:8,height:3,background:"#3a3a3c",borderRadius:2}}><div style={{height:3,background:"#5B5FC7",borderRadius:2,width:`${p.l}%`,transition:"width .5s"}}/></div>
                </div>
              </DarkCard>
            )}
          </div>
        </div>}

        {/* ═══ TOOLS ═══ */}
        {sec==="tools"&&<div>
          <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
            <button className={`fb ${cat==="all"?"a":""}`} onClick={()=>setCat("all")}>Все (15)</button>
            {Object.entries(CL).map(([k,v])=><button key={k} className={`fb ${cat===k?"a":""}`} onClick={()=>setCat(k)} style={cat===k?{background:"#1c1c1e",borderColor:"#1c1c1e"}:{}}>{v}</button>)}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {ft.map(t=>{
              const isO=op===t.id;
              return <div key={t.id} className={isO?"topen":"tcard"}>
                <div onClick={()=>setOp(isO?null:t.id)} className="tool-head">
                  <div style={{display:"flex",gap:16,alignItems:"center",flex:1,minWidth:0}}>
                    <span style={{fontSize:32,flexShrink:0}}>{t.icon}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"#8e8e93"}}>#{String(t.id).padStart(2,"0")}</span>
                        <span style={{fontSize:10,fontWeight:600,color:CC[t.cat],background:`${CC[t.cat]}15`,padding:"2px 10px",borderRadius:8}}>{CL[t.cat]}</span>
                        <span style={{fontSize:10,fontWeight:600,color:CXC[t.cx],background:`${CXC[t.cx]}15`,padding:"2px 10px",borderRadius:8}}>{CXL[t.cx]}</span>
                      </div>
                      <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>{t.name}</div>
                      <div className="tool-oneliner" style={{fontSize:13,color:"#8e8e93"}}>{t.one}</div>
                    </div>
                  </div>
                  <div className="tool-meta">
                    <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#8e8e93",textTransform:"uppercase",letterSpacing:.5}}>Срок</div><div style={{fontSize:15,fontWeight:700,color:"#5B5FC7"}}>{t.rt}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:10,color:"#8e8e93",textTransform:"uppercase",letterSpacing:.5}}>Экономия</div><div style={{fontSize:14,fontWeight:700,color:"#30D158"}}>{t.sv}</div></div>
                    <div style={{fontSize:16,color:"#8e8e93",transition:"transform .2s",transform:isO?"rotate(180deg)":"rotate(0)"}}>▾</div>
                  </div>
                </div>
                {isO&&<div className="tool-body" style={{borderTop:"1px solid #e5e5ea"}}>
                  <div style={{paddingTop:16}}>
                    <div className="dblk"><div style={{fontSize:11,fontWeight:700,color:"#5B5FC7",textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>Что это такое</div><p style={{fontSize:14,color:"#48484a",lineHeight:1.7}}>{t.what}</p></div>
                    <div className="dblk"><div style={{fontSize:11,fontWeight:700,color:"#5B5FC7",textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>Как работает</div>{t.hw.map((s,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:8}}><span className="stp" style={{background:CC[t.cat]}}>{i+1}</span><span style={{fontSize:13,color:"#48484a",lineHeight:1.5}}>{s}</span></div>)}</div>
                    <div className="g2" style={{gap:10}}>
                      <div className="dblk"><div style={{fontSize:11,fontWeight:700,color:"#8e8e93",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Технический стек</div><p style={{fontSize:12,color:"#636366",fontFamily:"'SF Mono','JetBrains Mono',monospace"}}>{t.stack}</p></div>
                      <div className="dblk"><div style={{fontSize:11,fontWeight:700,color:"#FF9F0A",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Что нужно заранее</div><p style={{fontSize:12,color:"#636366"}}>{t.pr}</p></div>
                    </div>
                    <div className="dblk" style={{background:"#5B5FC710",border:"1px solid #5B5FC730"}}><div style={{fontSize:11,fontWeight:700,color:"#5B5FC7",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Пример</div><p style={{fontSize:13,color:"#48484a",lineHeight:1.6,fontStyle:"italic"}}>{t.ex}</p></div>
                    <div style={{background:"#1c1c1e",borderRadius:12,padding:16,marginBottom:10}}><div style={{fontSize:11,fontWeight:700,color:"#FF9F0A",textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>⏱ Реалистичный план — {t.rt}</div><p style={{fontSize:13,color:"#ffffffcc",lineHeight:1.6}}>{t.tl}</p></div>
                    <div className="g2" style={{gap:10}}>
                      <div style={{background:"#30D15810",borderRadius:12,padding:16}}><div style={{fontSize:11,fontWeight:700,color:"#30D158",textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Экономия</div><div style={{fontSize:18,fontWeight:800,color:"#30D158"}}>{t.sv}</div><div style={{fontSize:12,color:"#48484a",marginTop:4}}>{t.mn}</div></div>
                      <div style={{background:"#f2f2f7",borderRadius:12,padding:16}}><div style={{fontSize:11,fontWeight:700,color:"#8e8e93",textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Сложность</div><div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}><span style={{background:CXC[t.cx],color:"#fff",padding:"4px 14px",fontSize:12,fontWeight:700,borderRadius:8}}>{CXL[t.cx]}</span><span style={{fontSize:13,color:"#636366",fontWeight:600}}>{t.rt}</span></div></div>
                    </div>
                  </div>
                </div>}
              </div>;
            })}
          </div>
        </div>}

        {/* ═══ ROI ═══ */}
        {sec==="roi"&&<div>
          <div className="g21" style={{marginBottom:12}}>
            <DarkCard>
              <CardLabel>Инвестиция vs Экономия, тыс. ₽/год</CardLabel>
              <ResponsiveContainer width="100%" height={260}><BarChart data={roiD} barGap={4}><XAxis dataKey="n" tick={{fontSize:10,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><YAxis tick={{fontSize:10,fill:"#ffffff60"}} axisLine={false} tickLine={false}/><Tooltip contentStyle={ttStyle}/><Legend wrapperStyle={{fontSize:11,color:"#fff"}}/><Bar dataKey="i" fill="#FF453A" radius={[4,4,0,0]} name="Инвестиция"/><Bar dataKey="s" fill="#30D158" radius={[4,4,0,0]} name="Экономия"/></BarChart></ResponsiveContainer>
            </DarkCard>
            <DarkCard>
              <CardLabel>По категориям</CardLabel>
              <ResponsiveContainer width="100%" height={260}><PieChart><Pie data={[{n:"Маркетинг",v:30},{n:"Финансы",v:25},{n:"HR",v:15},{n:"Сервис",v:15},{n:"Комплаенс",v:8},{n:"Аналитика",v:7}]} cx="50%" cy="50%" innerRadius={50} outerRadius={90} paddingAngle={3} dataKey="v" nameKey="n">{PIE_C.map((c,i)=><Cell key={i} fill={c}/>)}</Pie><Tooltip contentStyle={ttStyle}/></PieChart></ResponsiveContainer>
            </DarkCard>
          </div>
          <div className="g4">
            {[{l:"Стоимость",v:"4-10K",u:"₽/мес"},{l:"Экономия/год",v:"2-5",u:"млн ₽"},{l:"Окупаемость",v:"1-4",u:"недели"},{l:"ROI",v:"50-400",u:"x"}].map((r,i)=>
              <DarkCard key={i} style={{textAlign:"center"}}>
                <div style={{fontSize:11,color:"#ffffff60",textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>{r.l}</div>
                <BigNum unit={r.u}>{r.v}</BigNum>
              </DarkCard>
            )}
          </div>
        </div>}

        {/* ═══ ROADMAP ═══ */}
        {sec==="roadmap"&&<div>
